<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Bir Şey Soracağım ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial,sans-serif;
    background:#ffe6ec;
    text-align:center;
}

#question{
    font-size:40px;
    margin-bottom:30px;
}

button{
    padding:15px 30px;
    margin:10px;
    font-size:24px;
    border:none;
    border-radius:15px;
    cursor:pointer;
}

#yes{
    background:#4CAF50;
    color:white;
}

#no{
    background:#f44336;
    color:white;
}

#result{
    display:none;
}

img{
    max-width:350px;
    border-radius:20px;
}
</style>
</head>

<body>

<div id="main">
    <h1 id="question">Beni Affeder Misin? ❤️</h1>

    <button id="yes">Evet ❤️</button>
    <button id="no">Hayır 😔</button>
</div>

<div id="result">
    <img src="bizimfoto.jpeg" alt="Biz">
    <h2>Seni Çok Seviyorum Çibicik ❤️</h2>
    <p>
        Yarın Benimle Buluşur musun?
    </p>
</div>

<script>

let yesBtn = document.getElementById("yes");
let noBtn = document.getElementById("no");
let question = document.getElementById("question");

let size = 1;

const messages = [
"Emin misin? 😢",
"Gerçekten mi? 🥺",
"Bir daha düşün ❤️",
"Lütfen 😭",
"Bak çok üzüldüm 😔",
"Son kararın mı? 💔"
];

let count = 0;

noBtn.addEventListener("click", () => {

    size += 0.5;

    yesBtn.style.transform = `scale(${size})`;

    if(count < messages.length){
        question.innerText = messages[count];
        count++;
    }

    if(size > 5){
        yesBtn.style.position = "fixed";
        yesBtn.style.top = "0";
        yesBtn.style.left = "0";
        yesBtn.style.width = "100vw";
        yesBtn.style.height = "100vh";
        yesBtn.style.fontSize = "80px";
        noBtn.style.display = "none";
    }

});

yesBtn.addEventListener("click", () => {

    document.getElementById("main").style.display = "none";
    document.getElementById("result").style.display = "block";

});

</script>

</body>
</html>
