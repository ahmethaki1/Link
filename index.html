<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Çibicik ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffd6e7,#fff0f5);
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.container{
    padding:20px;
    z-index:2;
}

h1{
    color:#ff4081;
    font-size:3rem;
    margin-bottom:30px;
}

button{
    border:none;
    border-radius:25px;
    padding:15px 35px;
    margin:10px;
    font-size:24px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

#yes{
    background:#2ecc71;
    color:white;
}

#no{
    background:#ff4d4d;
    color:white;
}

#result{
    display:none;
    padding:20px;
    z-index:2;
}

#result img{
    width:380px;
    max-width:90%;
    border-radius:25px;
    border:5px solid white;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.message{
    margin-top:20px;
    font-size:42px;
    color:#ff4081;
    font-weight:bold;
}

.sub{
    margin-top:15px;
    font-size:28px;
}

.heart{
    position:fixed;
    top:-50px;
    font-size:28px;
    animation:fall linear infinite;
    z-index:1;
}

@keyframes fall{
    from{
        transform:translateY(-100px);
    }
    to{
        transform:translateY(110vh);
    }
}
</style>
</head>

<body>

<audio id="music" preload="auto" loop>
    <source src="muzik.mp3" type="audio/mpeg">
</audio>

<div class="container" id="main">

    <h1 id="question">
        Beni affeder misin Çibicik? ❤️
    </h1>

    <button id="yes">❤️ Evet</button>
    <button id="no">😔 Hayır</button>

</div>

<div id="result">

    <img src="bizimfoto.jpeg" alt="Bizim Fotoğrafımız">

    <div class="message">
        Seni çok seviyorum ❤️
    </div>

    <div class="sub">
        Yarın seni görebilir miyim? 🥺
    </div>

</div>

<script>

const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const question = document.getElementById("question");
const music = document.getElementById("music");

let scale = 1;

const messages = [
    "Emin misin? 😢",
    "Gerçekten mi? 🥺",
    "Bir daha düşün ❤️",
    "Lütfen 😭",
    "Çok üzüldüm 😔",
    "Sensiz olmuyor 💔",
    "Son kararın mı? 😭"
];

let count = 0;

noBtn.addEventListener("click", () => {

    scale += 0.5;

    yesBtn.style.transform = `scale(${scale})`;

    if(count < messages.length){
        question.innerHTML = messages[count];
        count++;
    }

    if(scale > 4){

        yesBtn.style.position = "fixed";
        yesBtn.style.left = "0";
        yesBtn.style.top = "0";
        yesBtn.style.width = "100vw";
        yesBtn.style.height = "100vh";
        yesBtn.style.fontSize = "90px";
        yesBtn.style.borderRadius = "0";

        noBtn.style.display = "none";
    }
});

yesBtn.addEventListener("click", () => {

    music.volume = 0.5;

    music.play().catch(function(error){
        console.log(error);
    });

    document.getElementById("main").style.display = "none";
    document.getElementById("result").style.display = "block";
});

for(let i=0;i<50;i++){

    let heart = document.createElement("div");

    heart.className = "heart";

    heart.innerHTML = "❤️";

    heart.style.left = Math.random()*100 + "vw";

    heart.style.animationDuration =
        (4 + Math.random()*6) + "s";

    document.body.appendChild(heart);
}

</script>

</body>
</html>
